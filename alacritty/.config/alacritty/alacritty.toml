[font]
normal = { family = "JetBrains Mono" }
size = 14.0

[window]
#decorations = "none"        # Equivalent to window-decoration = false
opacity = 0.9

[selection]
save_to_clipboard = true    # Equivalent to clipboard-read = allow

[colors.primary]
background = "#24283b"
foreground = "#c0caf5"

[colors.normal]
black   = "#1a1b26"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"
