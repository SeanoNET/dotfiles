# TPM plugins are installed at runtime — bootstrap handles initial clone,
# then prefix + I to install/update plugins in a live tmux session.

set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g default-shell /usr/bin/zsh
set-option -g default-command /usr/bin/zsh

# https://github.com/jabirali/tmux-tilish
set -s escape-time 0
set -g base-index 1

unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf


set -g mouse on #Allow mouse use
set-option -g history-limit 5000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on #Enable window to rename after deleting one in the list

bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"

bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"

bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1


bind c new-window -c "#{pane_current_path}" #Keeping Current Path

bind Space last-window

bind-key C-Space switch-client -l

# act like vim
bind -r C-j resize-pane -D 15
bind -r C-k resize-pane -U 15
bind -r C-h resize-pane -L 15
bind -r C-l resize-pane -R 15

setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# joins pane from another window
bind-key J command-prompt -p "Join pane from window:" "join-pane -h -s '%%'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'lost-melody/tmux-command-palette'
set -g @plugin 'jabirali/tmux-tilish' # https://github.com/jabirali/tmux-tilish?tab=readme-ov-file#keybindings
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_show_git 1

#Lazygit popup
bind -r g popup -d '#{pane_current_path}' -E -w 90% -h 90% lazygit

#Cheat sheet popup
bind -r ? popup -E -w 85% -h 85% "glow -p ~/dotfiles/CHEATSHEET.md"

run '~/.config/tmux/plugins/tpm/tpm'
