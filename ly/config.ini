# Ly display manager config — Tokyo Night theme
# Install: sudo cp config.ini /etc/ly/config.ini

# ── Colors (0xSSRRGGBB) ─────────────────────────────────────────
# Tokyo Night palette
bg = 0x001A1B26
fg = 0x00C0CAF5
border_fg = 0x007AA2F7
error_bg = 0x001A1B26
error_fg = 0x01F7768E

# ── Animation ────────────────────────────────────────────────────
animation = matrix
cmatrix_fg = 0x009ECE6A
cmatrix_head_col = 0x01C0CAF5

# ── Appearance ───────────────────────────────────────────────────
blank_box = true
hide_borders = false
hide_key_hints = false
hide_version_string = true
bigclock = en
clock = %H:%M

# ── Behavior ─────────────────────────────────────────────────────
default_input = login
clear_password = true
input_len = 34
